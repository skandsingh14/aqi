<script>
document.addEventListener('DOMContentLoaded', async () => {

const refreshBtn = document.getElementById('refresh-btn');
const loader = document.getElementById('chart-loader');
const barWrapper = document.getElementById('bar-chart-wrapper');
const aqiCanvas = document.getElementById('aqiBarChart');
const pieCanvas = document.getElementById('pollutantPieChart');
const rankingList = document.getElementById('ranking-list');
const execGrid = document.getElementById('executive-grid');

let aqiChartInstance = null;
let pieChartInstance = null;


// ✅ ONLY CITY NAME FUNCTION
function getCityName(fullName){
return fullName.split('-')[0].split(',')[0].trim();
}


async function loadDashboardData(){

loader.style.display='flex';
barWrapper.style.display='none';
rankingList.innerHTML='';
execGrid.innerHTML='';

if(aqiChartInstance){aqiChartInstance.destroy();}
if(pieChartInstance){pieChartInstance.destroy();}

let citiesData=[];
let avgPollutants={pm2_5:0,pm10:0,no2:0,so2:0,co:0,o3:0};

try{

const cities=[
'Delhi','Mumbai','Bangalore','Chennai','Kolkata',
'Hyderabad','Pune','Ahmedabad','Jaipur','Lucknow'
];

const res=await fetch(`/api/pollution/bulk?cities=${cities.join(',')}`);
const data=await res.json();

data.forEach(item=>{
if(!item || !item.data) return;

citiesData.push({
city:getCityName(item.city),   // ✅ ONLY CITY
aqi:calculateProxyAqi(item.data),
comps:item.data
});
});

citiesData.forEach(i=>{
avgPollutants.pm2_5+=i.comps.pm2_5||0;
avgPollutants.pm10+=i.comps.pm10||0;
avgPollutants.no2+=i.comps.no2||0;
avgPollutants.so2+=i.comps.so2||0;
avgPollutants.co+=i.comps.co||0;
avgPollutants.o3+=i.comps.o3||0;
});

Object.keys(avgPollutants).forEach(k=>{
avgPollutants[k]/=citiesData.length;
});

}catch(e){
console.error(e);
}

loader.style.display='none';

citiesData.sort((a,b)=>b.aqi-a.aqi);


// ✅ TOP 3 CARDS
citiesData.slice(0,3).forEach((item,i)=>{

const info=getAqiInfo(item.aqi);

const card=document.createElement('div');
card.className='col-span-4 glass';

card.innerHTML=`
<div>${item.city}</div>
<div style="font-size:40px;color:${info.colorHex}">
${Math.floor(item.aqi)}
</div>
<div class="badge ${info.bgClass}">
${info.label}
</div>
`;

execGrid.appendChild(card);

});


// ✅ RANKING LIST
citiesData.forEach((item,index)=>{

const info=getAqiInfo(item.aqi);

const div=document.createElement('div');

div.style.cssText="display:flex;justify-content:space-between;padding:1rem 0;border-bottom:1px solid rgba(255,255,255,0.05);";

div.innerHTML=`
<div>
${index+1}. ${item.city}
</div>

<div class="badge ${info.bgClass}">
${Math.floor(item.aqi)}
</div>
`;

rankingList.appendChild(div);

});


// ✅ BAR CHART
barWrapper.style.display='block';

aqiChartInstance=new Chart(aqiCanvas,{
type:'bar',
data:{
labels:citiesData.map(d=>d.city), // only city
datasets:[{
data:citiesData.map(d=>d.aqi),
backgroundColor:'#6366f1'
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});


// ✅ PIE CHART
pieChartInstance=new Chart(pieCanvas,{
type:'doughnut',
data:{
labels:['PM2.5','PM10','NO2','SO2','CO','O3'],
datasets:[{
data:[
avgPollutants.pm2_5,
avgPollutants.pm10,
avgPollutants.no2,
avgPollutants.so2,
avgPollutants.co,
avgPollutants.o3
]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}

refreshBtn.addEventListener('click',loadDashboardData);

loadDashboardData();

setInterval(()=>{
if(!document.hidden) loadDashboardData();
},300000);

});
</script>
