{% extends 'base.html' %}

{% block page_title %}Analytics Dashboard{% endblock %}

{% block content %}
<div class="dashboard-grid fade-in" id="executive-grid"></div>

<div class="dashboard-grid fade-in" style="margin-top: 4rem;">
    
    <div class="col-span-8 glass" style="padding: 3rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3rem;">
            <div>
                <h3 class="gradient-text" style="margin:0; font-size:1.8rem;">Regional Intelligence Map</h3>
                <p style="color:var(--text-low); margin-top:0.5rem;">Cross-station AQI comparison</p>
            </div>
            <button class="btn" id="refresh-btn">
                <i class="fa-solid fa-rotate"></i> Sync Live
            </button>
        </div>

        <div id="chart-loader" class="loader-container" style="height:400px;display:flex;">
            <div class="spinner"></div>
        </div>

        <div id="bar-chart-wrapper" style="height:400px;display:none;">
            <canvas id="aqiBarChart"></canvas>
        </div>
    </div>

    <div class="col-span-4 glass" style="padding:3rem;">
        <h3 style="margin-bottom:2rem;">Pollutant Mix</h3>
        <div style="height:320px;">
            <canvas id="pollutantPieChart"></canvas>
        </div>
    </div>

    <div class="col-span-12 glass" style="padding:4rem;">
        <h2 class="gradient-text">National Priority Index</h2>
        <div id="ranking-list"></div>
    </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {

const refreshBtn = document.getElementById('refresh-btn');
const loader = document.getElementById('chart-loader');
const barWrapper = document.getElementById('bar-chart-wrapper');
const aqiCanvas = document.getElementById('aqiBarChart');
const pieCanvas = document.getElementById('pollutantPieChart');
const rankingList = document.getElementById('ranking-list');
const execGrid = document.getElementById('executive-grid');

let aqiChartInstance = null;
let pieChartInstance = null;

function getCityName(name){
return name.split(',')[0].split('-')[0].trim();
}

async function loadDashboardData(){

loader.style.display='flex';
barWrapper.style.display='none';
rankingList.innerHTML='';
execGrid.innerHTML='';

if(aqiChartInstance){aqiChartInstance.destroy();}
if(pieChartInstance){pieChartInstance.destroy();}

let citiesData=[];
let avgPollutants={pm2_5:0,pm10:0,no2:0,so2:0,co:0,o3:0};

try{

const cities=[
'Delhi','Mumbai','Bangalore','Chennai','Kolkata',
'Hyderabad','Pune','Ahmedabad','Jaipur','Lucknow'
];

const res=await fetch(`/api/pollution/bulk?cities=${cities.join(',')}`);
const data=await res.json();

const cityGroups={};

data.forEach(item=>{
if(!item || !item.data) return;

const city=getCityName(item.city);
const aqi=calculateProxyAqi(item.data);

if(!cityGroups[city] || aqi>cityGroups[city].aqi){
cityGroups[city]={city,aqi,comps:item.data};
}
});

citiesData=Object.values(cityGroups);

citiesData.forEach(i=>{
avgPollutants.pm2_5+=i.comps.pm2_5||0;
avgPollutants.pm10+=i.comps.pm10||0;
avgPollutants.no2+=i.comps.no2||0;
avgPollutants.so2+=i.comps.so2||0;
avgPollutants.co+=i.comps.co||0;
avgPollutants.o3+=i.comps.o3||0;
});

Object.keys(avgPollutants).forEach(k=>{
avgPollutants[k]/=citiesData.length;
});

}catch(e){
console.error(e);
}

loader.style.display='none';

citiesData.sort((a,b)=>b.aqi-a.aqi);

citiesData.slice(0,3).forEach((item,i)=>{

const info=getAqiInfo(item.aqi);

const card=document.createElement('div');
card.className='col-span-4 glass';

card.innerHTML=`
<div>${item.city}</div>
<div style="font-size:40px;color:${info.colorHex}">
${Math.floor(item.aqi)}
</div>
<div class="badge ${info.bgClass}">
${info.label}
</div>
`;

execGrid.appendChild(card);

});

citiesData.forEach((item,index)=>{

const info=getAqiInfo(item.aqi);

const div=document.createElement('div');

div.style.cssText="display:flex;justify-content:space-between;padding:1rem 0;border-bottom:1px solid rgba(255,255,255,0.05);";

div.innerHTML=`
<div>
${index+1}. ${item.city}
</div>

<div class="badge ${info.bgClass}">
${Math.floor(item.aqi)}
</div>
`;

rankingList.appendChild(div);

});

barWrapper.style.display='block';

aqiChartInstance=new Chart(aqiCanvas,{
type:'bar',
data:{
labels:citiesData.map(d=>d.city),
datasets:[{
data:citiesData.map(d=>d.aqi),
backgroundColor:'#6366f1'
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

pieChartInstance=new Chart(pieCanvas,{
type:'doughnut',
data:{
labels:['PM2.5','PM10','NO2','SO2','CO','O3'],
datasets:[{
data:[
avgPollutants.pm2_5,
avgPollutants.pm10,
avgPollutants.no2,
avgPollutants.so2,
avgPollutants.co,
avgPollutants.o3
]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

}

refreshBtn.addEventListener('click',loadDashboardData);

loadDashboardData();

setInterval(()=>{
if(!document.hidden) loadDashboardData();
},300000);

});
</script>
{% endblock %}
